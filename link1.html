<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빙점(氷點)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #233B99 0%, #f0f9ff 100%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .profile-board {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 50px 60px;
            width: 750px;
            max-height: 70vh;
            box-sizing: border-box;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;

            opacity: 0;
            transform: scale(0.95);
            animation: boardFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0s;
        }

        @keyframes boardFadeIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .profile-board::-webkit-scrollbar {
            display: none;
        }

        .profile-board{
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .top-text {
            text-align: center;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .top-text h1 { 
            font-size: 30px; 
            margin: 0 0 12px 0;
            white-space: nowrap;
            overflow: hidden; 
            width: 0;         
            animation: textTyping 1s steps(12) forwards;
            animation-delay: 1s; 
        }

        .top-text p { 
            font-size: 16px; 
            font-weight: 500;
            color: #444;
            margin: 0;
            white-space: nowrap;
            overflow: hidden; 
            width: 0;         
            animation: textTyping 1.2s steps(22) forwards;
            animation-delay: 2s; 
        }

        @keyframes textTyping {
            from { width: 0%; }
            to { width: 100%; }
        }
        
        .divider {
            display: block;
            position: relative;
            clear: both;
            flex-shrink: 0;
            width: 0px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.3), transparent);
            margin: 30px auto; 
            animation: expandWidth 0.8s ease forwards;
            animation-delay: 3.2s; 
        }

        @keyframes expandWidth {
            from { width: 0px; }
            to { width: 550px; }
        }

        .profile-section {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 60px; 
            width: 100%;
        }

        .profile-card-set {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; 
            width: 220px;
        }

        .side-card {
            width: 220px;
            height: 310px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            background: #fff;
            flex-shrink: 0;
            
            opacity: 0;
            animation: fadeInUpCard 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .side-card.left {
            animation-delay: 4.0s;
        }

        .side-card.right {
            animation-delay: 4.6s;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeInUpCard {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-desc-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.75); 
            border-radius: 15px; 
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            box-sizing: border-box;
            text-align: center;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            word-break: keep-all;

            opacity: 0;
            animation: fadeInBox 0.6s ease forwards;

            display: grid;
            grid-template-column: 60px 1fr;
            text-align: left;
            row-gap: 10px
        }

        .profile-desc-box.left {
            animation-delay: 5.2s;
        }

        .profile-desc-box.right {
            animation-delay: 5.8s;
        }

        @keyframes fadeInBox {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #snow-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: 1; 
            overflow: hidden;
        }

        .snow {
            position: absolute; 
            top: -20px;
            color: white;
            pointer-events: none;
            animation: fall linear infinite; 
        }

        @keyframes fall { 
            0% { transform: translateY(0); }
            100% { transform: translateY(105vh); }
        }
    </style>
</head>
<body>

    <div id="snow-background"></div>

    <div class="profile-board">

        <div class="top-text">
            <h1>Judas & Iris</h1>
            <i><p>"얼어붙은 바다에 가라앉은 유일한 온기"</p></i>
        </div>

        <div class="divider"></div>

        <div class="profile-section">
            
            <div class="profile-card-set">
                <div class="side-card left">
                    <img src="image/J26.jpeg" alt="J" class="card-img">
                </div>
                <div class="profile-desc-box left">
                    <strong>Judas Day Wiseman</strong><i>"I love you, so please melt down."</i>
                    <strong>Gender</strong>M<br>
                    <strong>Age</strong>26<br>
                    <strong>Ability</strong>Burst Switch[S]<br>
                    <strong>Hair/Eyes</strong>Black/Blue<br>
                </div>
            </div>

            <div class="profile-card-set">
                <div class="side-card right">
                    <img src="image/Rie.jpeg" alt="Rie" class="card-img">
                </div>
                <div class="profile-desc-box right">
                    <strong>Iris Aether</strong><i>"I won't disappear. Promise."</i>
                    <strong>Gender</strong>F<br>
                    <strong>Age</strong>24<br>
                    <strong>Ability</strong>Purification[S]<br>
                    <strong>Hair/Eyes</strong>Silver/Gold<br>
                </div>
            </div>

        </div>

    </div>

    <script>
        function createSnow() {
            const snowContainer = document.getElementById("snow-background");
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 12 + 8) + "px";
            
            const fallDuration = Math.random() * 3 + 4;
            snow.style.animationDuration = `${fallDuration}s`;
            snow.style.opacity = Math.random() * 0.7 + 0.3;
            
            snowContainer.appendChild(snow);
            setTimeout(() => snow.remove(), fallDuration * 1000);
        }
        setInterval(createSnow, 150);
    </script>

</body>
</html>
