<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 구글 폰트에서 '나눔명조' 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>J x 리에</title>
    <style>
        /* 폰트 적용: 나눔명조를 1순위로, 없으면 기본 명조체 사용 */
        /* 1. 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: white;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            font-family: 'Nanum Myeongjo', serif;
        }

        /* 2. 슬라이더 외곽 컨테이너 */
        .slider-container {
            position: left;
            width: 400px;
            max-width: 800px;
            height: 600px;
            overflow: hidden; /* 영역 밖 카드는 숨김 */
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 10;

            margin-right: 150px;
        }

        /* 3. 개별 카드 스타일 (커다란 네모) */
        .leftcard {
            min-width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 150, 255, 0.1); /* 유리 질감 */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #333;
            font-size: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        }
    </style>
</head>
<body>

    <div style="position: relative;">
            <div class="slider-container">
    
                <!-- 카드 뭉치 -->
                <div class="slider-wrapper" id="slider">
                    <div class="leftcard">
                        <h1>test</h1>
                    </div>
                </div>
        </div>
    </div>

</body>
</html>
