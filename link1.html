<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>J x 리에</title>
    <style>
        /* 1. 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* 배경색 오타 수정: 대각선 선형 그라데이션으로 변경 */
            background: linear-gradient(135deg, #233B99 0%, #f0f9ff 100%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .main-Layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            gap: 50px; 
            margin-top: -200px;
            z-index: 10; 
        }

        /* --- ✍️ 1 & 2. 상단 텍스트 타이핑 애니메이션 --- */
        .top-text {
            text-align: center;
            color: #333;
            z-index: 20;
            margin-top: -200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-text h1 { 
            font-size: 32px; 
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            width: 0; /* 처음엔 안 보임 */
            /* 1초 동안 12글자를 쪼개서 타이핑 치듯 보여줌 */
            animation: typing 1s steps(12) forwards;
            animation-delay: 0.5s; /* 페이지 접속 후 0.5초 뒤 시작 */
        }

        .top-text p { 
            font-size: 16px; 
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            /* 1.5초 동안 22글자(공백포함)를 타이핑 치듯 보여줌 */
            animation: typing 1.5s steps(22) forwards;
            animation-delay: 1.8s; /* h1 타이핑이 끝난(0.5s + 1s) 후 시작 */
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* --- ➖ 3. 가로 줄 애니메이션 (중앙에서 양옆으로 쭉 늘어남) --- */
        .divider {
            width: 0%; /* 처음엔 너비 0 */
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.15), transparent);
            margin: 5px 0;
            animation: expandWidth 1s ease forwards;
            animation-delay: 3.5s; /* p태그 타이핑이 끝난 후 시작 */
        }

        @keyframes expandWidth {
            from { width: 0%; }
            to { width: 70%; }
        }

        /* --- 🎴 4. 이미지 카드 애니메이션 (아래에서 위로 스르륵 올라옴) --- */
        .cards-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            margin-top: -10px;
        }

        .side-card {
            width: 200px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: rgba(0, 150, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
            margin-left: -150px;
            margin-right: -150px;
            flex-shrink: 0;
            margin: 0;

            opacity: 0; /* 처음엔 투명 */
            animation: fadeInUpCard 1s ease forwards;
            animation-delay: 4.8s; /* 가로 줄이 생겨난 후 시작 */
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeInUpCard {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 💬 5. 말풍선 애니메이션 타임라인 연동 --- */
        .chat-container{
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 400px;
            z-index: 10;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 10px;
            opacity: 0; 
        }

        .typing span{
            width: 6px;
            height: 6px;
            background-color: #888;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }

        .typing span:nth-child(2) {animation-delay: 0.2s; }
        .typing span:nth-child(3) {animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% {transform: translateY(0);}
            50% { transform: translateY(-5px);}
        }

        @keyframes typingFade {
            0% {opacity: 0;}
            15% {opacity: 1;}
            85% {opacity: 1;}
            100% {opacity: 0;}
        }

        .bubble{
            position: relative;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            max-width:80%;
            word-break: keep-all;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* 카드가 완전히 올라온 시점(약 5.8초) 이후부터 톡이 시작됩니다 */
        .left-typing {
            align-self: flex-start;
            animation: typingFade 1.5s ease-in-out forwards;
            animation-delay: 6.0s; 
        }

        .left-bubble{
            opacity: 0;
            align-self: flex-start;
            background: #66B3FF;
            color: #333;
            border-top-left-radius: 2px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 7.5s;
        }

        .right-typing {
            align-self: flex-end;
            animation: typingFade 1.5s ease-in-out forwards;
            animation-delay: 8.5s;
        }

        .right-bubble{
            opacity: 0;
            align-self: flex-end;
            background: #FFFF00;
            color: #333;
            border-top-right-radius: 2px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 10.0s;
        }

        @keyframes fadeInUp{
            from {opacity: 0; transform: translateY(10px); }
            to {opacity: 1; transform: translateY(0); }
        }

        /* --- ❄️ 눈송이 전용 스타일 --- */
        #snow-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: 1; 
            overflow: hidden;
        }

        .snow {
            position: absolute; 
            top: -20px;
            color: white;
            pointer-events: none;
            animation: fall linear infinite; 
        }

        @keyframes fall { 
            0% { transform: translateY(0); }
            100% { transform: translateY(105vh); }
        }
    </style>
</head>
<body>

    <!-- 눈송이 컨테이너 -->
    <div id="snow-background"></div>

    <!-- 전체 레이아웃 -->
    <div class="main-Layout">

        <!-- 상단 텍스트 -->
        <div class="top-text">
            <h1>Judas & Iris</h1>
            <p>"얼어붙은 바다에 가라앉은 유일한 온기"</p>
        </div>

        <!-- 가로선 -->
        <div class="divider"></div>

        <!-- 중간 카드 & 대화섹션 -->
        <div class="cards-section">
            <!-- 왼쪽 카드 -->
            <div class="side-card left">
                <img src="image/J26.jpeg" alt="J" class="card-img">
            </div>

            <!-- 말풍선 대화창 -->
            <div class="chat-container">
                <!-- 왼쪽 입력 중 -->
                <div class="typing left-typing">
                    <span></span><span></span><span></span>
                </div>
                <div class="bubble left-bubble">"사랑합니다. 그러니까 녹으십시오."</div>

                <!-- 오른쪽 입력 중-->
                <div class="typing right-typing">
                    <span></span><span></span><span></span>
                </div>
                <div class="bubble right-bubble">"사라지지 않을게요. 약속."</div>
            </div>

            <!-- 오른쪽 카드 -->
            <div class="side-card right">
                <img src="image/Rie.jpeg" alt="Rie" class="card-img">
            </div>
        </div>
    </div>

    <script>
        // 눈 생성 로직
        function createSnow() {
            const snowContainer = document.getElementById("snow-background");
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 12 + 8) + "px";
            
            const fallDuration = Math.random() * 3 + 4;
            snow.style.animationDuration = `${fallDuration}s`;
            snow.style.opacity = Math.random() * 0.7 + 0.3;
            
            snowContainer.appendChild(snow);
            setTimeout(() => snow.remove(), fallDuration * 1000);
        }
        setInterval(createSnow, 150);
    </script>

</body>
</html>
