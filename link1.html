<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 구글 폰트에서 '나눔명조' 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>J x 리에</title>
    <style>
        /* 폰트 적용: 나눔명조를 1순위로, 없으면 기본 명조체 사용 */
        /* 1. 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #F0F4F8 0%, #D9E2EC 100%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            font-family: 'Nanum Myeongjo', serif;
        }

        .main-Layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            gap: 40px;
            column: 50px;
        }

        .top-text {
            text-align: center;
            color: #333;
            z-index: 20;
        }

        .top-text h1 { font-size: 32px; margin-bottom: 10px;}
        .top-text p { font-size: 16px; opacity: 0.8;}

        /* 3. 개별 카드 스타일 (커다란 네모) */

        .cards-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
            width: 100%;
        }

        /* 카드 공통 */
        .side-card {
            width: 200px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: rgba(0, 150, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
    </style>
</head>
<body>
    <!-- 전체 감쌈 -->
    <div class="main-Layout">

        <!-- 상단 -->
        <div class="top-text">
            <h1>Judas & Iris</h1>
            <p>"얼어붙은 바다에 가라앉은 유일한 온기"</p>
        </div>

        <!-- 중간 -->
        <div class="cards-section">
            <!-- 왼쪽 -->
            <div class="side-card left">
                <img src="image/J26.jpeg" alt="J" class="card-img">
            </div>
            <!-- 오른쪽 -->
            <div class="side-card right">
                <h1>iris</h1>
            </div>
        </div>
    </div>

</body>
</html>
