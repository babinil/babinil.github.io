<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빙점(氷點) - Frozen Desk</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --paper-bg: #fdfdfd;
            --paper-texture: repeating-linear-gradient(45deg, rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, transparent 1px, transparent 10px);
            --text-color: #2c3e50;
            --main-accent: #233B99;
            --desk-gradient: linear-gradient(135deg, #1a1c2c 0%, #4a5d8a 100%);
        }

        body.if-mode {
            --glass-bg: rgba(0, 0, 0, 0.3);
            --paper-bg: #f4f1ea;
            --text-color: #1a0510;
            --main-accent: #ff3b69;
            --desk-gradient: linear-gradient(135deg, #0f0510 0%, #2c1a2c 100%);
        }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            background: var(--desk-gradient);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            perspective: 1500px;
        }

        #snow-background {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 5;
        }
        .snow {
            position: absolute; top: -20px; color: white;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        .profile-board {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 50px;
            width: 900px;
            max-height: 90vh;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.1);
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.5s;
            transform-style: preserve-3d;
        }

        .page-flipping {
            transform: rotateY(-110deg) scale(0.9);
            opacity: 0;
        }

        .paper-box {
            background: var(--paper-bg);
            background-image: var(--paper-texture);
            border-radius: 4px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.15), 0 0 2px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .paper-box::after {
            content: '';
            position: absolute; bottom: 0; right: 0;
            width: 20px; height: 20px;
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.05) 50%);
        }

        .if-toggle-btn {
            position: absolute; top: 30px; right: 30px;
            background: rgba(0,0,0,0.05);
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 8px 16px; border-radius: 4px;
            font-size: 11px; font-weight: bold; cursor: pointer;
            z-index: 30; transition: all 0.3s;
        }
        .if-toggle-btn:hover { background: var(--text-color); color: #fff; }

        .top-text { text-align: center; margin-bottom: 30px; }
        .top-text h1 { font-size: 36px; margin: 0; color: var(--text-color); letter-spacing: -1px; }
        .top-text p { font-style: italic; opacity: 0.8; margin: 10px 0; }

        .divider {
            height: 1px; background: linear-gradient(to right, transparent, var(--text-color), transparent);
            opacity: 0.2; margin: 25px 0; width: 100%;
        }

        .profile-section { display: flex; justify-content: center; gap: 40px; width: 100%; }

        .profile-card-set { width: 250px; display: flex; flex-direction: column; gap: 20px; }

        .side-card {
            width: 100%; height: 320px;
            border: 8px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: rotate(-2deg);
            transition: all 0.5s;
        }
        .side-card.right { transform: rotate(2deg); }
        .side-card:hover { transform: rotate(0deg) scale(1.05); z-index: 15; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }

        .profile-desc-box {
            padding: 20px; font-size: 13px; color: #333; line-height: 1.6;
            display: grid; grid-template-columns: 80px 1fr; gap: 8px;
        }
        .char-header { grid-column: span 2; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; margin-bottom: 5px; }
        .char-header .name { font-size: 16px; display: block; }
        .char-header .quote { font-size: 11px; opacity: 0.7; }

        .story-btn {
            margin-top: 30px;
            background: var(--paper-bg);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 15px 50px; border-radius: 2px;
            font-weight: bold; color: var(--main-accent);
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .story-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            z-index: 100; display: none; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .story-book-box {
            width: 750px; height: 80vh; padding: 60px;
            transform: rotateX(10deg);
        }
        .book-body { overflow-y: auto; height: 80%; padding-right: 20px; line-height: 2; }
    </style>
</head>
<body>

    <div id="snow-background"></div>

    <div class="profile-board" id="mainBoard">
        <button class="if-toggle-btn" onclick="handleToggle()">ROUTE : ORIGINAL</button>

        <div class="top-text">
            <h1 id="mainTitle">Judas & Iris</h1>
            <p id="mainSub">"얼어붙은 바다에 가라앉은 유일한 온기"</p>
            <div id="tagContainer">
                </div>
        </div>

        <div class="divider"></div>

        <div class="profile-section">
            <div class="profile-card-set">
                <div class="side-card paper-box">
                    <img src="image/J26.jpeg" alt="J" class="card-img" id="imgJudas">
                </div>
                <div class="profile-desc-box paper-box" id="profileJudas">
                    <div class="char-header">
                        <strong class="name">Judas Day Wiseman</strong>
                        <i class="quote">"I love you, so please melt down."</i>
                    </div>
                    <strong>Dept</strong> <span class="department">Dracal</span>
                    <strong>Ability</strong> <span class="ability-val">Burst Switch[S]</span>
                </div>
            </div>

            <div class="profile-card-set">
                <div class="side-card paper-box right">
                    <img src="image/Rie.jpeg" alt="Rie" class="card-img" id="imgIris">
                </div>
                <div class="profile-desc-box paper-box" id="profileIris">
                    <div class="char-header">
                        <strong class="name">Iris Aether</strong>
                        <i class="quote">"I won't disappear. Promise."</i>
                    </div>
                    <strong>Age</strong> <span class="age">24</span>
                    <strong>Ability</strong> <span class="ability-val">Purification[S]</span>
                </div>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="story-btn" onclick="openStoryModal()">VIEW DOCUMENTS</button>
        </div>
    </div>

    <div class="modal-overlay" id="storyModal" onclick="closeStoryModal(event)">
        <div class="story-book-box paper-box">
            <div class="book-header">
                <h2 id="modalBookTitle" style="margin-top:0">氷點</h2>
                <p id="modalBookSub"></p>
            </div>
            <div class="book-body" id="modalBookBody"></div>
        </div>
    </div>

    <script>
        const contentData = {
            original: {
                btnText: "ROUTE : ORIGINAL",
                mainTitle: "Judas & Iris",
                subTitle: '"얼어붙은 바다에 가라앉은 유일한 온기"',
                judas: { img: "image/J26.jpeg", quote: '"I love you, so please melt down."', dept: "Dracal" },
                iris: { img: "image/Rie.jpeg", name: "Iris Aether", quote: '"I\'ll stay."', age: "24" },
                story: { title: "빙점(氷點)", sub: "물이 어는 점이자, 얼음이 녹는 점", text: "ㅎㅎㅎㅎㅎ" }
            },
            ifMode: {
                btnText: "ROUTE : IF",
                mainTitle: "Judas & Aurora",
                subTitle: '"인"',
                judas: { img: "image/Judas.png", quote: '"O Deus meus..."', dept: "Villain" },
                iris: { img: "image/Aurora.jpeg", name: "Aurora", quote: '"God is dead."', age: "24?" },
                story: { title: "氷點 : IF", sub: "다시 얼어붙은 시간", text: "꺆" }
            }
        };

        let isIfMode = false;

        function handleToggle() {
            const board = document.getElementById('mainBoard');
            
            board.classList.add('page-flipping');

            setTimeout(() => {
                isIfMode = !isIfMode;
                const mode = isIfMode ? 'ifMode' : 'original';
                const data = contentData[mode];

                if(isIfMode) document.body.classList.add('if-mode');
                else document.body.classList.remove('if-mode');

                document.querySelector('.if-toggle-btn').innerText = data.btnText;
                document.getElementById('mainTitle').innerText = data.mainTitle;
                document.getElementById('mainSub').innerText = data.subTitle;
                document.getElementById('imgJudas').src = data.judas.img;
                document.getElementById('imgIris').src = data.iris.img;
                
                board.classList.remove('page-flipping');
            }, 400);
        }

        function createSnow() {
            const snowContainer = document.getElementById("snow-background");
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 10 + 10) + "px";
            const duration = Math.random() * 3 + 5;
            snow.style.animationDuration = duration + "s";
            snow.style.opacity = Math.random();
            snowContainer.appendChild(snow);
            setTimeout(() => snow.remove(), duration * 1000);
        }
        setInterval(createSnow, 200);

        function openStoryModal() {
            const mode = isIfMode ? 'ifMode' : 'original';
            const s = contentData[mode].story;
            document.getElementById('modalBookTitle').innerText = s.title;
            document.getElementById('modalBookSub').innerText = s.sub;
            document.getElementById('modalBookBody').innerText = s.text;
            document.getElementById('storyModal').classList.add('active');
        }

        function closeStoryModal(e) {
            if(e.target.id === 'storyModal') e.target.classList.remove('active');
        }
    </script>
</body>
</html>
