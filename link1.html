<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 구글 폰트에서 '나눔명조' 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>J x 리에</title>
    <style>
        /* 폰트 적용: 나눔명조를 1순위로, 없으면 기본 명조체 사용 */
        /* 1. 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #F0F4F8 0%, #D9E2EC 100%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            font-family: 'Nanum Myeongjo', serif;
        }

        .main-Layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            gap: 50px; /* 카드와 상단 사이 간격*/
            margin-top: -200px;
        }

        .top-text {
            text-align: center;
            color: #333;
            z-index: 20;
            margin-top: -200px;
        }

        .top-text h1 { font-size: 32px; margin-bottom: 10px;}
        .top-text p { font-size: 16px; opacity: 0.8;}

        /* 3. 개별 카드 스타일 (커다란 네모) */

        .cards-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 400px;
            width: 100%;
            margin-top: -10px;
        }

        /* 카드 공통 */
        .side-card {
            width: 200px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: rgba(0, 150, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
            margin-left: -150px;
            margin-right: -150px;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .divider {
            width: 70%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.15), transparent);

            margin: 5px 0;
        }

        .chat-container{
            display: flex;
            flex-directio: column;
            gap: 15px;
            width: 500px;
            z-index: 10;
        }

        .bubble{
            position: relative;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            Line-height: 1.4;
            max-width:80%;
            word-break: keep-all;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .legt-bubble{
            align-self: flex-start;
            background: blue:
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .right-bubble{
            align-self: flex-end;
            background: #FEE500;
            color: #333;
            border-bottom-right-radius:2px;
        }

        @keyframes fadeInUp{
            from {opacity: 0; transform: translateY(10px); }
            to {opacity: 1; transform: translateY(0); }
        }

        .bubble {
            animation: fadeInUp 0.8s ease forwards;
        }

        .bubble:nth-child(1) {animation-delay: 0.5s;}
        .bubble:nth-child(2) {animation-delay: 1.5s;}
        
    </style>
</head>
<body>
    <!-- 전체 감쌈 -->
    <div class="main-Layout">

        <!-- 상단 -->
        <div class="top-text">
            <h1>Judas & Iris</h1>
            <p>"얼어붙은 바다에 가라앉은 유일한 온기"</p>
        </div>

        <!-- 선 -->
        <div class="divider"></div>

        <!-- 중간 -->
        <div class="cards-section">
            <!-- 왼쪽 -->
            <div class="side-card left">
                <img src="image/J26.jpeg" alt="J" class="card-img">
            </div>

            <!-- 말풍선 -->
            <div class="chat-container">
                <div class="bubble left-bubble">"사랑합니다. 그러니까 녹으십시오."</div>
                <div class="bubble right-bubble">"사라지지 않을게요. 약속."</div>
            </div>
            <!-- 오른쪽 -->
            <div class="side-card right">
                <img src="image/Rie.jpeg" alt="Rie" class="card-img">
            </div>
        </div>
    </div>

</body>
</html>
