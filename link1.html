<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빙점(氷點)</title></title>
    <style>
        /* 1. 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(135deg, #233B99FF 0%, #f0f9ff 100%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .main-Layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            gap: 50px; /* 카드와 상단 사이 간격*/
            margin-top: -200px;
            z-index: 10; /* 눈송이보다 위에 오도록 설정 */
        }

        .top-text {
            text-align: center;
            color: #333;
            z-index: 20;
            margin-top: -200px;
        }

        .top-text h1 { font-size: 32px; margin-bottom: 10px;}
        .top-text p { font-size: 16px; opacity: 0.8;}

        /* 3. 개별 카드 스타일 (커다란 네모) */
        .cards-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            margin-top: -10px;
        }

        /* 카드 공통 */
        .side-card {
            width: 200px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: rgba(0, 150, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
            margin-left: -150px;
            margin-right: -150px;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .divider {
            width: 70%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.15), transparent);
            margin: 5px 0;
        }

        /* --- 채팅창 레이아웃 & 애니메이션 --- */
        .chat-container{
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 400px;
            z-index: 10;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 10px;
            opacity: 0; /* 기본적으로 안 보임 */
        }

        .typing span{
            width: 6px;
            height: 6px;
            background-color: #888;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }

        .typing span:nth-child(2) {animation-delay: 0.2s; }
        .typing span:nth-child(3) {animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% {transform: translateY(0);}
            50% { transform: translateY(-5px);}
        }

        @keyframes typingFade {
            0% {opacity: 0;}
            15% {opacity: 1;}
            85% {opacity: 1;}
            100% {opacity: 0;}
        }

        .bubble{
            position: relative;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            max-width:80%;
            word-break: keep-all;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* 1. 왼쪽 ... 표시 (0초에 등장) */
        .left-typing {
            align-self: flex-start;
            animation: typingFade 1.5s ease-in-out forwards;
            animation-delay: 0s;
        }

        /* 2. 왼쪽 말풍선 (1.5초에 등장) */
        .left-bubble{
            opacity: 0;
            align-self: flex-start;
            background: #66B3FF;
            color: #333;
            border-top-left-radius: 2px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 1.5s;
        }

        /* 3. 오른쪽 ... 표시 (2초에 등장) */
        .right-typing {
            align-self: flex-end;
            animation: typingFade 1.5s ease-in-out forwards;
            animation-delay: 2.0s;
        }

        /* 4. 오른쪽 말풍선 (3.5초에 등장) */
        .right-bubble{
            opacity: 0;
            align-self: flex-end;
            background: #FFFF00;
            color: #333;
            border-top-right-radius: 2px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 3.5s;
        }

        .side-card {
            flex-shrink: 0;
            width: 200px;
            height: 300px;
            margin: 0;
        }

        @keyframes fadeInUp{
            from {opacity: 0; transform: translateY(10px); }
            to {opacity: 1; transform: translateY(0); }
        }

        /* --- ❄️ 눈송이 전용 컨테이너 및 스타일 (가로 밀림 완벽 방지) --- */
        #snow-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* 클릭 방해 금지 */
            z-index: 1; /* 대화창 배경 뒤로 배치 */
            overflow: hidden;
        }

        .snow {
            position: absolute; /* flex 정렬 영향을 전혀 받지 않음 */
            top: -20px;
            color: white;
            pointer-events: none;
            /* 낙하(fall) 애니메이션만 적용하여 똑바로 수직 낙하 */
            animation: fall linear infinite; 
        }

        @keyframes fall { 
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(105vh);
            }
        }
        
    </style>
</head>
<body>

    <!-- ❄️ 눈송이가 생성될 독립된 레이어창 (body의 flex 영향을 받지 않음) -->
    <div id="snow-background"></div>

    <!-- 전체 감쌈 -->
    <div class="main-Layout">

        <!-- 상단 -->
        <div class="top-text">
            <h1>Judas & Iris</h1>
            <p>"얼어붙은 바다에 가라앉은 유일한 온기"</p>
        </div>

        <!-- 선 -->
        <div class="divider"></div>

        <!-- 중간 -->
        <div class="cards-section">
            <!-- 왼쪽 -->
            <div class="side-card left">
                <img src="image/J26.jpeg" alt="J" class="card-img">
            </div>

            <!-- 말풍선 -->
            <div class="chat-container">
                <!-- 왼쪽 입력 중 -->
                <div class="typing left-typing">
                    <span></span><span></span><span></span>
                </div>
                <div class="bubble left-bubble">"사랑합니다. 그러니까 녹으십시오."</div>

                <!-- 오른쪽 입력 중-->
                <div class="typing right-typing">
                    <span></span><span></span><span></span>
                </div>
                <div class="bubble right-bubble">"사라지지 않을게요. 약속."</div>
            </div>
            <!-- 오른쪽 -->
            <div class="side-card right">
                <img src="image/Rie.jpeg" alt="Rie" class="card-img">
            </div>
        </div>
    </div>

    <script>
        // 눈 생성 로직 (눈 전용 컨테이너인 #snow-background 에 추가)
        function createSnow() {
            const snowContainer = document.getElementById("snow-background");
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 12 + 8) + "px";
            
            // 수직으로만 깔끔하게 떨어지도록 duration 하나만 바인딩
            const fallDuration = Math.random() * 3 + 4;
            snow.style.animationDuration = `${fallDuration}s`;
            
            snow.style.opacity = Math.random() * 0.7 + 0.3;
            
            // body가 아닌 독립 컨테이너에 탑재!
            snowContainer.appendChild(snow);
            
            setTimeout(() => snow.remove(), fallDuration * 1000);
        }
        setInterval(createSnow, 150);
    </script>

</body>
</html>
