<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>J x 리에</title>
    <style>
        /* 1. 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #233B99 0%, #f0f9ff 100%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .main-Layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            gap: 45px; 
            margin-top: -200px;
            z-index: 10; 
        }

        /* --- 상단 텍스트 타이핑 애니메이션 --- */
        .top-text {
            text-align: center;
            color: #333;
            z-index: 20;
            margin-top: -200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-text h1 { 
            font-size: 32px; 
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 1s steps(12) forwards;
            animation-delay: 0.5s;
        }

        .top-text p { 
            font-size: 16px; 
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 1.5s steps(22) forwards;
            animation-delay: 1.8s;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* --- 가로 줄 애니메이션 --- */
        .divider {
            width: 0%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.15), transparent);
            margin: 1px 0;
            animation: expandWidth 1s ease forwards;
            animation-delay: 3.5s;
        }

        @keyframes expandWidth {
            from { width: 0%; }
            to { width: 70%; }
        }

        /* --- 이미지 카드 애니메이션 --- */
        .cards-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            margin-top: -10px;
        }

        .side-card {
            width: 200px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: rgba(0, 150, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
            flex-shrink: 0;
            margin: 0;
            opacity: 0;
            animation: fadeInUpCard 1s ease forwards;
            animation-delay: 4.8s;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeInUpCard {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 💬 대화창 레이아웃 및 교체 애니메이션 --- */
        .chat-container{
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 400px;
            z-index: 10;
        }

        /* 말풍선 기본 베이스 */
        .bubble {
            position: relative;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            max-width: 80%;
            word-break: keep-all;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            opacity: 0; /* 처음엔 안보임 */
        }

        /* 말풍선 내부의 실제 텍스트 글자 (처음엔 숨겼다가 점차 등장) */
        .bubble-text {
            opacity: 0;
        }

        /* 말풍선 내부의 ... 점들 */
        .typing-dots {
            display: flex;
            gap: 4px;
            position: absolute;
            top: 50%;
            left: 18px;
            transform: translateY(-50%);
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background-color: #555;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* 내부 요소 페이드인/아웃용 */
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* ====================================================
           ⏳ 타임라인 제어 (핵심!)
           ==================================================== */

        /* 1. 왼쪽 대화 (카드가 다 올라온 후 6.0초에 시작) */
        .left-bubble {
            align-self: flex-start;
            background: #66B3FF;
            color: #333;
            border-top-left-radius: 2px;
            /* 6초에 아래에서 위로 말풍선 자체가 뿅 생겨남 */
            animation: fadeInUp 0.5s ease 6.0s forwards; 
        }
        /* 왼쪽 점 : 6초에 켜져서 점멸하다가 7.5초(1.5초 뒤)에 사라짐 */
        .left-bubble .typing-dots {
            animation: fadeOut 0.3s ease 7.5s forwards;
        }
        /* 왼쪽 글자 : 점이 사라지는 7.5초에 타이밍 맞춰 등장 */
        .left-bubble .bubble-text {
            animation: fadeIn 0.5s ease 7.5s forwards;
        }


        /* 2. 오른쪽 대화 (왼쪽 글자가 다 나오고 조금 뒤인 8.5초에 시작) */
        .right-bubble {
            align-self: flex-end;
            background: #FAF884;
            color: #333;
            border-top-right-radius: 2px;
            /* 8.5초에 말풍선 자체가 생겨남 */
            animation: fadeInUp 0.5s ease 8.5s forwards;
        }
        /* 오른쪽 점 : 8.5초에 생겨서 10.0초에 사라짐 */
        .right-bubble .typing-dots {
            animation: fadeOut 0.3s ease 10.0s forwards;
        }
        /* 오른쪽 글자 : 10.0초에 타이밍 맞춰 등장 */
        .right-bubble .bubble-text {
            animation: fadeIn 0.5s ease 10.0s forwards;
        }


        /* 말풍선 등장 애니메이션 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ❄️ 눈송이 전용 스타일 --- */
        #snow-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: 1; 
            overflow: hidden;
        }

        .snow {
            position: absolute; 
            top: -20px;
            color: white;
            pointer-events: none;
            animation: fall linear infinite; 
        }

        @keyframes fall { 
            0% { transform: translateY(0); }
            100% { transform: translateY(105vh); }
        }
    </style>
</head>
<body>

    <!-- 눈송이 컨테이너 -->
    <div id="snow-background"></div>

    <!-- 전체 레이아웃 -->
    <div class="main-Layout">

        <!-- 상단 텍스트 -->
        <div class="top-text">
            <h1>Judas & Iris</h1>
            <p>"얼어붙은 바다에 가라앉은 유일한 온기"</p>
        </div>

        <!-- 가로선 -->
        <div class="divider"></div>

        <!-- 중간 카드 & 대화섹션 -->
        <div class="cards-section">
            <!-- 왼쪽 카드 -->
            <div class="side-card left">
                <img src="image/J26.jpeg" alt="J" class="card-img">
            </div>

            <!-- 💬 말풍선 대화창 (구조 변경됨!) -->
            <div class="chat-container">
                
                <!-- 왼쪽 대화 덩어리 -->
                <div class="bubble left-bubble">
                    <!-- 입력 중 점 세개 -->
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <!-- 실제 내용 글자 -->
                    <span class="bubble-text">"사랑합니다. 그러니까 녹으십시오."</span>
                </div>

                <!-- 오른쪽 대화 덩어리 -->
                <div class="bubble right-bubble">
                    <!-- 입력 중 점 세개 -->
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <!-- 실제 내용 글자 -->
                    <span class="bubble-text">"사라지지 않을게요. 약속."</span>
                </div>

            </div>

            <!-- 오른쪽 카드 -->
            <div class="side-card right">
                <img src="image/Rie.jpeg" alt="Rie" class="card-img">
            </div>
        </div>
    </div>

    <script>
        // 눈 생성 로직
        function createSnow() {
            const snowContainer = document.getElementById("snow-background");
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 12 + 8) + "px";
            
            const fallDuration = Math.random() * 3 + 4;
            snow.style.animationDuration = `${fallDuration}s`;
            snow.style.opacity = Math.random() * 0.7 + 0.3;
            
            snowContainer.appendChild(snow);
            setTimeout(() => snow.remove(), fallDuration * 1000);
        }
        setInterval(createSnow, 150);
    </script>

</body>
</html>
