<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빙점(氷點)</title>
    <style>
        /* 1. 기본 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #233B99 0%, #f0f9ff 100%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        /* --- 🤍 1. 중앙 하얀색 창 (Profile Board) --- */
        .profile-board {
            background: rgba(255, 255, 255, 0.45); /* 하얀색 반투명 */
            backdrop-filter: blur(20px); /* 뒤 배경 흐리게 해서 영롱한 느낌 */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 50px 60px;
            width: 750px;
            max-height: 70vh;
            box-sizing: border-box;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;

            /* 인트로 애니메이션: 살짝 커지며 투명도 페이드인 */
            opacity: 0;
            transform: scale(0.95);
            animation: boardFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0s;
        }

        @keyframes boardFadeIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .profile-board::-webkit-scrollbar {
            display: none;
        }

        .profile-board{
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* --- ✍️ 2 & 3. 상단 텍스트 타이핑 애니메이션 복구 --- */
        .top-text {
            text-align: center;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .top-text h1 { 
            font-size: 30px; /* 줄이신 폰트 크기 유지 */
            margin: 0 0 12px 0;
            white-space: nowrap;
            overflow: hidden; /* 👈 타이핑을 위해 필수 */
            width: 0;         /* 👈 시작할 때 글자를 숨김 */
            animation: typing h1-typing 1s steps(12) forwards;
            animation-delay: 0.5s; /* 유리창이 뜨고 난 뒤 시작 */
        }

        .top-text p { 
            font-size: 16px; 
            font-weight: 500;
            color: #444;
            margin: 0;
            white-space: nowrap;
            overflow: hidden; /* 👈 타이핑을 위해 필수 */
            width: 0;         /* 👈 시작할 때 글자를 숨김 */
            animation: typing p-typing 1.2s steps(22) forwards;
            animation-delay: 1.5s; /* h1 타이핑이 끝난 뒤 시작 */
        }

        /* 타이핑 핵심 애니메이션 효과 */
        @keyframes typing {
            from { width: 0%; }
            to { width: 100%; }
        }
        

        /* --- ➖ 4. 가로 줄 애니메이션 --- */
        .divider {
            display: block;
            width: 0px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.2), transparent);
            margin: 25px 0 40px 0; /* 위아래 간격 확보 */
            animation: expandWidth 1s ease forwards;
            animation-delay: 2.8s; /* 글자 타이핑이 완벽히 끝난 후 재생 */
        }

        @keyframes expandWidth {
            from { width: 0px; }
            to { width: 550px; }
        }

        /* --- 👥 프로필 레이아웃 (좌/우 배치) --- */
        .profile-section {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 60px; /* 두 프로필 사이의 간격 */
            width: 100%;
        }

        /* 프로필 개별 묶음 (카드 + 프로필 창) */
        .profile-card-set {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* 카드와 아래 텍스트창 사이 여백 */
            width: 220px;
        }

        /* --- 🎴 5. 이미지 카드 스타일 & 개별 시간차 애니메이션 --- */
        .side-card {
            width: 220px;
            height: 310px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            background: #fff;
            flex-shrink: 0;
            
            opacity: 0;
            animation: fadeInUpCard 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* [카드] 왼쪽 먼저 등장 */
        .side-card.left {
            animation-delay: 4.5s;
        }

        /* [카드] 오른쪽 순차 등장 */
        .side-card.right {
            animation-delay: 5.3s;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeInUpCard {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 📝 6 & 7. 하단 모서리가 둥근 프로필 텍스트창 --- */
        .profile-desc-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.75); /* 카드 아래 선명도를 위해 약간 더 불투명하게 */
            border-radius: 15px; /* 모서리가 둥근 네모 */
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            box-sizing: border-box;
            text-align: center;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            word-break: keep-all;

            opacity: 0;
            animation: fadeInBox 0.6s ease forwards;
        }

        /* [텍스트창] 왼쪽 먼저 등장 */
        .profile-desc-box.left {
            animation-delay: 6.2s;
        }

        /* [텍스트창] 오른쪽 최종 등장 */
        .profile-desc-box.right {
            animation-delay: 7.0s;
        }

        @keyframes fadeInBox {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ❄️ 눈송이 전용 스타일 (그대로 유지) --- */
        #snow-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: 1; 
            overflow: hidden;
        }

        .snow {
            position: absolute; 
            top: -20px;
            color: white;
            pointer-events: none;
            animation: fall linear infinite; 
        }

        @keyframes fall { 
            0% { transform: translateY(0); }
            100% { transform: translateY(105vh); }
        }
    </style>
</head>
<body>

    <!-- 배경 눈 내리는 효과 -->
    <div id="snow-background"></div>

    <!-- 🤍 1. 중앙 흰색 보드 창 -->
    <div class="profile-board">

        <!-- 2 & 3. 상단 텍스트 -->
        <div class="top-text">
            <h1>Judas & Iris</h1>
            <p>"얼어붙은 바다에 가라앉은 유일한 온기"</p>
        </div>

        <!-- 4. 가로선 -->
        <div class="divider"></div>

        <!-- 프로필 섹션 영역 -->
        <div class="profile-section">
            
            <!-- 👥 왼쪽 페어 세트 (카드 + 프로필 설명) -->
            <div class="profile-card-set">
                <!-- 5. 왼쪽 카드 -->
                <div class="side-card left">
                    <img src="image/J26.jpeg" alt="J" class="card-img">
                </div>
                <!-- 6. 왼쪽 설명 프로필창 -->
                <div class="profile-desc-box left">
                    <strong>주다스 (Judas)</strong><br>
                    여기에 캐릭터의 소개나 프로필 텍스트를 자유롭게 채워 넣으실 수 있습니다.
                </div>
            </div>

            <!-- 👥 오른쪽 페어 세트 (카드 + 프로필 설명) -->
            <div class="profile-card-set">
                <!-- 5. 오른쪽 카드 -->
                <div class="side-card right">
                    <img src="image/Rie.jpeg" alt="Rie" class="card-img">
                </div>
                <!-- 7. 오른쪽 설명 프로필창 -->
                <div class="profile-desc-box right">
                    <strong>아이리스 (Iris)</strong><br>
                    여기에 리에(아이리스)의 프로필이나 소개 문구를 채워 넣으실 수 있습니다.
                </div>
            </div>

        </div> <!-- profile-section 끝 -->

    </div> <!-- profile-board 끝 -->

    <script>
        // 눈 생성 로직 (그대로 유지)
        function createSnow() {
            const snowContainer = document.getElementById("snow-background");
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 12 + 8) + "px";
            
            const fallDuration = Math.random() * 3 + 4;
            snow.style.animationDuration = `${fallDuration}s`;
            snow.style.opacity = Math.random() * 0.7 + 0.3;
            
            snowContainer.appendChild(snow);
            setTimeout(() => snow.remove(), fallDuration * 1000);
        }
        setInterval(createSnow, 150);
    </script>

</body>
</html>
