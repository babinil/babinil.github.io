<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빙점(氷點) - Memoir</title>
    <style>
        :root {
            --paper-color: #ffffff;
            --line-color: #e5e5e5;
            --text-main: #333333;
            --accent-blue: #233B99;
            --accent-pink: #ff3b69;
            --bg-color: #f0f0f0;
            --tape-color: rgba(173, 216, 230, 0.5);
        }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: var(--bg-color);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden; perspective: 2000px;
        }

        #snow-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
        }

        .book-container {
            width: 1000px; height: 650px;
            position: relative; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
            opacity: 0; transform: rotateX(10deg) scale(0.8);
            animation: bookOpenInit 1.5s ease-out forwards;
        }

        @keyframes bookOpenInit {
            to { opacity: 1; transform: rotateX(0deg) scale(1); }
        }

        .book-wrapper {
            display: flex; width: 100%; height: 100%;
            background: white; border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden; position: relative;
        }

        .book-wrapper::before {
            content: ''; position: absolute; left: 50%; top: 0;
            width: 2px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.05), rgba(0,0,0,0.1), rgba(0,0,0,0.05));
            z-index: 10;
        }

        .page-left {
            flex: 1; padding: 40px; position: relative;
            display: flex; flex-direction: column; justify-content: space-around; align-items: center;
            border-right: 1px solid var(--line-color);
        }

        .page-right {
            flex: 1; padding: 60px; position: relative;
            display: flex; flex-direction: column; justify-content: center;
        }

        .photo-frame {
            width: 220px; height: 280px; background: #fff;
            padding: 10px 10px 40px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative; transition: transform 0.3s;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .tape {
            position: absolute; width: 80px; height: 25px;
            background: var(--tape-color);
            top: -10px; left: 50%; transform: translateX(-50%) rotate(-2deg);
            backdrop-filter: blur(2px); border: 1px solid rgba(255,255,255,0.3);
        }

        .profile-header { margin-bottom: 30px; }
        .profile-header h1 { font-size: 32px; margin: 0; color: var(--accent-blue); letter-spacing: -1px; }
        .profile-header p { margin: 5px 0; font-style: italic; color: #777; font-size: 14px; }

        .info-grid { display: grid; grid-template-columns: 80px 1fr; gap: 12px; font-size: 14px; color: #444; }
        .info-grid b { color: var(--text-main); }

        .next-page-btn {
            position: absolute; bottom: 30px; right: 30px;
            background: none; border: none; cursor: pointer;
            font-size: 12px; color: #999; font-weight: bold;
            transition: color 0.3s;
        }
        .next-page-btn:hover { color: var(--accent-pink); }

        .story-trigger {
            margin-top: 40px; padding: 12px 25px;
            background: var(--accent-blue); color: white;
            border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }
        .story-trigger:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(35, 59, 153, 0.3); }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white; width: 600px; padding: 50px; border-radius: 15px;
            max-height: 70vh; overflow-y: auto; line-height: 1.8; position: relative;
        }

        .flip-anim {
            animation: pageFlip 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        @keyframes pageFlip {
            50% { transform: rotateY(-20deg) scale(0.95); opacity: 0.5; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        body.if-mode {
            --accent-blue: var(--accent-pink);
            --tape-color: rgba(255, 59, 105, 0.2);
            --bg-color: #1a1a1a;
        }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="book-container" id="book">
        <div class="book-wrapper">
            <div class="page-left">
                <div class="photo-frame" style="transform: rotate(-3deg);">
                    <div class="tape"></div>
                    <img src="image/J26.jpeg" alt="Judas" id="imgJ">
                </div>
                <div class="photo-frame" style="transform: rotate(3deg);">
                    <div class="tape" style="background: rgba(255,255,255,0.4);"></div>
                    <img src="image/Rie.jpeg" alt="Iris" id="imgI">
                </div>
            </div>

            <div class="page-right">
                <div class="profile-header">
                    <h1 id="title">Judas & Iris</h1>
                    <p id="sub">"얼어붙은 바다에 가라앉은 유일한 온기"</p>
                </div>

                <div class="info-grid" id="profileInfo">
                    <b>Judas</b> <span>Wiseman / 26 / Dracal</span>
                    <b>Iris</b> <span>Aether / 24 / Purification</span>
                    <b>Risk</b> <span>Presence rate↓, Immunity↓</span>
                </div>

                <button class="story-trigger" onclick="toggleModal(true)">Our Story</button>

                <button class="next-page-btn" onclick="flipPage()">Next Page (IF Route) →</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal" onclick="toggleModal(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle">빙점(氷點) : ㅇ</h2>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <div id="modalText">
                스!토!리!
            </div>
        </div>
    </div>

    <script>
        // 데이터 설정
        const data = {
            original: {
                title: "Judas & Iris",
                sub: '"얼어붙은 바다에 가라앉은 유일한 온기"',
                info: `<b>Judas</b> <span>Wiseman / 26 / Dracal</span>
                       <b>Iris</b> <span>Aether / 24 / Purification</span>
                       <b>Risk</b> <span>Presence rate↓, Immunity↓</span>`,
                story: "Original Route Story: 기승전결 내용...",
                btn: "Next Page (IF Route) →"
            },
            ifMode: {
                title: "Judas & Aurora",
                sub: '"다시 태어난 얼음의 망령"',
                info: `<b>Judas</b> <span>Wiseman / 26 / Villain</span>
                       <b>Aurora</b> <span>Ghost / 24? / 氷結[A]</span>
                       <b>Feature</b> <span>Returned from the dead</span>`,
                story: "IF Route Story: 만약의 이야기...",
                btn: "← Back to Original"
            }
        };

        let isIfMode = false;

        function flipPage() {
            const book = document.getElementById('book');
            book.classList.add('flip-anim');
            
            setTimeout(() => {
                isIfMode = !isIfMode;
                const current = isIfMode ? data.ifMode : data.original;
                
                document.body.classList.toggle('if-mode', isIfMode);
                document.getElementById('title').innerText = current.title;
                document.getElementById('sub').innerText = current.sub;
                document.getElementById('profileInfo').innerHTML = current.info;
                document.getElementById('modalText').innerText = current.story;
                document.querySelector('.next-page-btn').innerText = current.btn;
                
                createBurstSnow();
            }, 600);

            setTimeout(() => book.classList.remove('flip-anim'), 1200);
        }

        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
        }

        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Snowflake {
            constructor(burst = false) {
                this.x = Math.random() * canvas.width;
                this.y = burst ? Math.random() * canvas.height : -10;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.velX = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.y += this.speed;
                this.x += this.velX;
                if (this.y > canvas.height) this.y = -10;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initSnow() {
            for (let i = 0; i < 50; i++) particles.push(new Snowflake(true));
        }

        function createBurstSnow() {
            for (let i = 0; i < 30; i++) particles.push(new Snowflake());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        initSnow();
        animate();
    </script>
</body>
</html>
