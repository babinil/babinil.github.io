<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빙점(氷點)</title>
    <style>
        /* 1. 기본 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #233B99 0%, #f0f9ff 100%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        /* --- 🤍 1. 중앙 하얀색 창 (Profile Board) --- */
        .profile-board {
            background: rgba(255, 255, 255, 0.45); /* 하얀색 반투명 */
            backdrop-filter: blur(20px); /* 뒤 배경 흐리게 해서 영롱한 느낌 */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 50px 60px;
            width: 750px;
            max-height: 70vh;
            box-sizing: border-box;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;

            /* [단계 1] 유리창 인트로 애니메이션 (0초~1초) */
            opacity: 0;
            transform: scale(0.95);
            animation: boardFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0s;
        }

        @keyframes boardFadeIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .profile-board::-webkit-scrollbar {
            display: none;
        }

        .profile-board{
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* --- ✍️ 2 & 3. 상단 텍스트 타이핑 애니메이션 (문법 오류 수정) --- */
        .top-text {
            text-align: center;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .top-text h1 { 
            font-size: 30px; 
            margin: 0 0 12px 0;
            white-space: nowrap;
            overflow: hidden; 
            width: 0;         
            /* [단계 2] 유리창이 다 뜨는 1초 시점에 타이핑 시작 (1초~2초) */
            animation: textTyping 1s steps(12) forwards;
            animation-delay: 1s; 
        }

        .top-text p { 
            font-size: 16px; 
            font-weight: 500;
            color: #444;
            margin: 0;
            white-space: nowrap;
            overflow: hidden; 
            width: 0;         
            /* [단계 3] h1 타이핑이 끝나는 2초 시점에 타이핑 시작 (2초~3.2초) */
            animation: textTyping 1.2s steps(22) forwards;
            animation-delay: 2s; 
        }

        /* 🔄 타이핑 통합 키프레임 이름 적용 */
        @keyframes textTyping {
            from { width: 0%; }
            to { width: 100%; }
        }
        

        /* --- ➖ 4. 가로 줄 애니메이션 --- */
        .divider {
            display: block;
            position: relative;
            clear: both;
            flex-shrink: 0;
            width: 0px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.3), transparent);
            margin: 30px auto; 
            /* [단계 4] p 태그 타이핑이 끝나는 3.2초 시점에 가로선이 쫙 펼쳐짐 */
            animation: expandWidth 0.8s ease forwards;
            animation-delay: 3.2s; 
        }

        @keyframes expandWidth {
            from { width: 0px; }
            to { width: 550px; }
        }

        /* --- 👥 프로필 레이아웃 (좌/우 배치) --- */
        .profile-section {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 60px; 
            width: 100%;
        }

        /* 프로필 개별 묶음 (카드 + 프로필 창) */
        .profile-card-set {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; 
            width: 220px;
        }

        /* --- 🎴 5. 이미지 카드 스타일 & 개별 시간차 애니메이션 --- */
        .side-card {
            width: 220px;
            height: 310px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            background: #fff;
            flex-shrink: 0;
            
            opacity: 0;
            animation: fadeInUpCard 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* [단계 5] 가로선까지 다 생기고 난 후, 왼쪽 카드 등장 */
        .side-card.left {
            animation-delay: 4.0s;
        }

        /* 오른쪽 카드는 순차적으로 이어서 등장 */
        .side-card.right {
            animation-delay: 4.6s;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeInUpCard {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 📝 6 & 7. 프로필 텍스트창 애니메이션 --- */
        .profile-desc-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.75); 
            border-radius: 15px; 
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            box-sizing: border-box;
            text-align: center;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            word-break: keep-all;

            opacity: 0;
            animation: fadeInBox 0.6s ease forwards;
        }

        /* 카드들이 자리를 잡은 후 설명창이 부드럽게 나타남 */
        .profile-desc-box.left {
            animation-delay: 5.2s;
        }

        .profile-desc-box.right {
            animation-delay: 5.8s;
        }

        @keyframes fadeInBox {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ❄️ 눈송이 전용 스타일 --- */
        #snow-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: 1; 
            overflow: hidden;
        }

        .snow {
            position: absolute; 
            top: -20px;
            color: white;
            pointer-events: none;
            animation: fall linear infinite; 
        }

        @keyframes fall { 
            0% { transform: translateY(0); }
            100% { transform: translateY(105vh); }
        }
    </style>
</head>
<body>

    <!-- 배경 눈 내리는 효과 -->
    <div id="snow-background"></div>

    <!-- 🤍 1. 중앙 흰색 보드 창 -->
    <div class="profile-board">

        <!-- 2 & 3. 상단 텍스트 -->
        <div class="top-text">
            <h1>Judas & Iris</h1>
            <p>"얼어붙은 바다에 가라앉은 유일한 온기"</p>
        </div>

        <!-- 4. 가로선 -->
        <div class="divider"></div>

        <!-- 프로필 섹션 영역 -->
        <div class="profile-section">
            
            <!-- 👥 왼쪽 페어 세트 (카드 + 프로필 설명) -->
            <div class="profile-card-set">
                <!-- 5. 왼쪽 카드 -->
                <div class="side-card left">
                    <img src="image/J26.jpeg" alt="J" class="card-img">
                </div>
                <!-- 6. 왼쪽 설명 프로필창 -->
                <div class="profile-desc-box left">
                    <strong>J</strong><br>
                    Name: Judas Day Wiseman
                    Gender: M
                    Age: 26
                    Ability: Burst Switch[S]
                    Hair/Eyes: Black/Blue
                    Tagline: "사랑합니다. 그러니까 녹으십시오."
                </div>
            </div>

            <!-- 👥 오른쪽 페어 세트 (카드 + 프로필 설명) -->
            <div class="profile-card-set">
                <!-- 5. 오른쪽 카드 -->
                <div class="side-card right">
                    <img src="image/Rie.jpeg" alt="Rie" class="card-img">
                </div>
                <!-- 7. 오른쪽 설명 프로필창 -->
                <div class="profile-desc-box right">
                    <strong>Rie</strong><br>
                    Name: Iris Aether
                    Gender: F
                    Age: 24
                    Ability: Purification[S]
                    Hair/Eyes: Silver/Gold
                    Tagline: "사라지지 않을게요. 약속."
                </div>
            </div>

        </div> <!-- profile-section 끝 -->

    </div> <!-- profile-board 끝 -->

    <script>
        // 눈 생성 로직 (그대로 유지)
        function createSnow() {
            const snowContainer = document.getElementById("snow-background");
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 12 + 8) + "px";
            
            const fallDuration = Math.random() * 3 + 4;
            snow.style.animationDuration = `${fallDuration}s`;
            snow.style.opacity = Math.random() * 0.7 + 0.3;
            
            snowContainer.appendChild(snow);
            setTimeout(() => snow.remove(), fallDuration * 1000);
        }
        setInterval(createSnow, 150);
    </script>

</body>
</html>
