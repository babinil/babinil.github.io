<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

.snow {
  position: fixed;
  top: -10px;
  color: white;
  font-size: 10px;
  user-select: none;
  pointer-events: none;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</head>
<body>

<script>
for (let i = 0; i < 100; i++) {
  let snow = document.createElement("div");
  snow.className = "snow";
  snow.innerHTML = "❄";
  snow.style.left = Math.random() * 100 + "vw";
  snow.style.animationDuration = (Math.random() * 3 + 2) + "s";
  snow.style.fontSize = (Math.random() * 10 + 10) + "px";
  document.body.appendChild(snow);
}
</script>

</body>
</html>
