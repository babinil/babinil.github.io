<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Snow Effect</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 떨어지는 눈 */
.snow {
  position: fixed;
  top: -10px;
  color: white;
  pointer-events: none;
  animation: fall linear forwards;
}

/* 바닥에 쌓인 눈 */
.snow-ground {
  position: fixed;
  color: white;
  pointer-events: none;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0.7;
  }
}
</style>
</head>
<body>

<script>
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

/* 떨어지는 눈 생성 */
function createSnow() {
  const snow = document.createElement("div");
  snow.className = "snow";
  snow.innerHTML = "❄";

  snow.style.left = (mouseX + (Math.random() * 100 - 50)) + "px";
  snow.style.fontSize = (Math.random() * 10 + 10) + "px";
  snow.style.animationDuration = (Math.random() * 2 + 2) + "s";

  document.body.appendChild(snow);

  setTimeout(() => {
    snow.remove();
    createGroundSnow(mouseX, mouseY);
  }, 3000);
}

/* 쌓이는 눈 */
function createGroundSnow(x, y) {
  const snow = document.createElement("div");
  snow.className = "snow-ground";
  snow.innerHTML = "❄";

  snow.style.left = (x + (Math.random() * 40 - 20)) + "px";
  snow.style.top = (y + (Math.random() * 10)) + "px";
  snow.style.fontSize = "10px";

  document.body.appendChild(snow);

  // 너무 많이 쌓이면 자동 삭제
  if (document.querySelectorAll(".snow-ground").length > 300) {
    document.querySelector(".snow-ground").remove();
  }
}

/* 반복 생성 */
setInterval(createSnow, 100);
</script>

</body>
</html>
