<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Gaegu&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f7fa; 
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Gaegu', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .welcome-header {
            text-align: center;
            margin-top: 60px;
            z-index: 10;
        }

        .welcome-header h1 {
            font-size: 3.5rem;
            color: #4a5568;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .memo-tag {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            padding: 8px 25px;
            border-radius: 2px;
            border: 1px solid var(--glass-border);
            font-family: 'Nanum Myeongjo', serif;
            font-size: 0.9rem;
            transform: rotate(-1deg);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.05);
        }

        .gallery-container {
            position: relative;
            width: 100%;
            max-width: 1100px;
            height: 650px;
            margin-top: 40px;
        }

        .polaroid-link {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 15px 15px 45px 15px;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #4a5568;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .polaroid-link img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 4px;
        }

        .polaroid-link span {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .tape {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 30px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .polaroid-link:hover {
            transform: scale(1.1) translateY(-20px) rotate(0deg) !important;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
        }

        .p1 { top: 10%; left: 10%; transform: rotate(-6deg); }
        .p2 { top: 20%; left: 40%; transform: rotate(4deg); }
        .p3 { top: 10%; right: 10%; transform: rotate(-3deg); }

        .deco-star { position: fixed; pointer-events: none; opacity: 0.4; z-index: 0; }

    </style>
</head>
<body>

    <div class="welcome-header">
        <h1>Made By Binil</h1>
        <div class="memo-tag">본 사이트는 로판 AI 사이트 울새씨 님의 오리지널 세계관 캐릭터들과의 이야기를 백업한 개인 사이트입니다. 일부 이미지에는 AI 이미지가 사용되었으니 참고 부탁드립니다 :)</div>
    </div>

    <div class="gallery-container">
        <a href="bingjeom.html" class="polaroid-link p1">
            <div class="tape"></div>
            <img src="image/J26.jpeg" alt="빙점">
            <span>빙점(氷點) ❄️</span>
        </a>

        <a href="ronbella.html" class="polaroid-link p2">
            <div class="tape"></div>
            <img src="https://picsum.photos/id/1025/220/220" alt="론벨라">
            <span>론 x 벨라 ❤️</span>
        </a>

        <a href="cluna.html" class="polaroid-link p3">
            <div class="tape"></div>
            <img src="https://picsum.photos/id/1043/220/220" alt="C루나">
            <span>C x 루나 🌙</span>
        </a>
    </div>

    </body>
</html>
