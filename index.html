<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Little World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Gaegu&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-color: #5d534a;
            --accent-color: #e8dcc4;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            font-family: 'Gaegu', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-color);
        }

        .header {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 30px;
            z-index: 10;
        }

        .header h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .notice-tape {
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 20px;
            font-family: 'Nanum Myeongjo', serif;
            font-size: 0.8rem;
            border-left: 15px solid #dcd0b9;
            border-right: 15px solid #dcd0b9;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-top: 15px;
        }

        .gallery {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 600px;
            margin-top: 20px;
        }

        .polaroid {
            position: absolute;
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            border: 1px solid #eee;
        }

        .polaroid img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            display: block;
            background-color: #f9f9f9;
        }

        .polaroid span {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
        }

        .polaroid::before {
            content: "";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 25px;
            background: rgba(210, 180, 140, 0.4);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        .polaroid:hover {
            transform: scale(1.05) translateY(-10px) rotate(0deg) !important;
            z-index: 100;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .item1 { top: 5%; left: 5%; transform: rotate(-5deg); }
        .item2 { top: 15%; left: 40%; transform: rotate(3deg); }
        .item3 { top: 10%; right: 5%; transform: rotate(-2deg); }
        .item4 { bottom: 10%; left: 15%; transform: rotate(4deg); }
        .item5 { bottom: 5%; right: 20%; transform: rotate(-4deg); }

        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .gallery { height: auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; padding-bottom: 50px;}
            .polaroid { position: relative; top: auto; left: auto; right: auto; transform: rotate(0deg) !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Made By Binil✨</h1>
        <div class="notice-tape">
            본 사이트는 로판 AI 사이트 울새씨 님의 오리지널 세계관 캐릭터들과의 이야기가 백업되어 있습니다.
            일부 이미지에는 AI 이미지가 사용되었으니 참고 부탁드립니다. :)
        </div>
    </div>

    <div class="gallery">
        <a href="link1.html" class="polaroid item1">
            <img src="https://picsum.photos/id/1012/200/200" alt="빙점">
            <span>빙점(氷點) ❄️</span>
        </a>

        <a href="link2.html" class="polaroid item2">
            <img src="https://picsum.photos/id/1025/200/200" alt="론벨라">
            <span>론 x 벨라 ❤️</span>
        </a>

        <a href="link3.html" class="polaroid item3">
            <img src="https://picsum.photos/id/1043/200/200" alt="C루나">
            <span>C x 루나 🌙</span>
        </a>

        <a href="#" class="polaroid item4">
            <img src="https://picsum.photos/id/1053/200/200" alt="바다">
            <span> 🌊</span>
        </a>

        <a href="#" class="polaroid item5">
            <img src="https://picsum.photos/id/152/200/200" alt="꽃">
            <span> 🌸</span>
        </a>
    </div>

    <script>
        function createSparkle() {
            const symbols = ["✨", "⭐", "☁️", "🌸", "🐾"];
            const sparkle = document.createElement("div");
            sparkle.className = "sparkle";
            sparkle.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            sparkle.style.left = Math.random() * 100 + "vw";
            sparkle.style.top = Math.random() * 100 + "vh";
            sparkle.style.fontSize = Math.random() * 10 + 10 + "px";
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.style.transition = "opacity 2s";
                sparkle.style.opacity = "0";
                setTimeout(() => sparkle.remove(), 2000);
            }, 3000);
        }

        setInterval(createSparkle, 1000);
    </script>
</body>
</html>
