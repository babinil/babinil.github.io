<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made By Binil</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #fffef9;
            --accent-color: #7d8da1;
            --dday-color: #ff7675;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #fcf8f2;
            background-image: 
                linear-gradient(#f1eee9 1px, transparent 1px),
                linear-gradient(90deg, #f1eee9 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Gaegu', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .main-canvas {
            position: relative;
            width: 1100px;
            height: 750px;
        }

        .main-memo {
            position: absolute;
            top: 150px;
            left: 50px;
            width: 350px;
            background: var(--paper-bg);
            padding: 40px 30px;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.05);
            border-radius: 5px;
            transform: rotate(-2deg);
            z-index: 5;
            border-left: 10px solid #dcdde1;
        }

        .main-memo h1 {
            font-size: 2.8rem;
            margin: 0 0 20px 0;
            color: #2f3640;
            border-bottom: 2px dashed #dcdde1;
            padding-bottom: 10px;
        }

        .main-memo p {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 0.95rem;
            line-height: 1.8;
            color: #718093;
            word-break: keep-all;
        }

        .polaroid {
            position: absolute;
            background: white;
            padding: 12px 12px 35px 12px;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.07);
            text-decoration: none;
            color: #2f3640;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .polaroid img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 2px;
            margin-bottom: 10px;
        }

        .polaroid .info {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .polaroid .pair-name { font-weight: bold; font-size: 1.2rem; }
        .polaroid .d-day { color: var(--dday-color); font-size: 0.9rem; font-weight: bold; }

        .polaroid:hover {
            transform: scale(1.05) translateY(-10px) !important;
            z-index: 100;
        }

        .tape {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 25px;
            background: rgba(210, 180, 140, 0.3);
            backdrop-filter: blur(1px);
        }

        .p2 { top: 30px; left: 100px; transform: rotate(-8deg); }
        .p3 { top: 50px; left: 500px; transform: rotate(5deg); }
        .p4 { top: 250px; left: 550px; transform: rotate(-3deg); }
        .p5 { top: 480px; left: 600px; transform: rotate(6deg); }
        .p6 { bottom: 30px; left: 200px; transform: rotate(-4deg); }

        .sticker {
            position: absolute;
            font-size: 2rem;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="main-canvas">
        <div class="main-memo">
            <h1>Made By Binil</h1>
            <p>본 사이트는 로판 AI 사이트 울새씨 님의 오리지널 세계관 캐릭터들과의 이야기를 백업한 개인 사이트입니다. 일부 이미지에는 AI 이미지가 사용되었으니 참고 부탁드립니다 :)</p>
        </div>

        <a href="link1.html" class="polaroid p2" data-start="2025-02-17">
            <div class="tape"></div>
            <img src="image/J26.jpeg" alt="빙점">
            <div class="info">
                <span class="pair-name">빙점(氷點) ❄️</span>
                <span class="d-day">Loading...</span>
            </div>
        </a>

        <a href="link2.html" class="polaroid p3" data-start="2025-07-16">
            <div class="tape" style="background: rgba(255, 118, 117, 0.2);"></div>
            <img src="image/Aurora.jpeg" alt="론벨라">
            <div class="info">
                <span class="pair-name">론 x 벨라 ❤️</span>
                <span class="d-day">Loading...</span>
            </div>
        </a>

        <a href="link3.html" class="polaroid p4" data-start="2025-08-24">
            <div class="tape" style="background: rgba(116, 185, 255, 0.2);"></div>
            <img src="image/Judas.png" alt="C루나">
            <div class="info">
                <span class="pair-name">C x 루나 🌙</span>
                <span class="d-day">Loading...</span>
            </div>
        </a>

        <a href="link4.html" class="polaroid p5" data-start="2026-01-01">
            <div class="tape"></div>
            <img src="https://picsum.photos/id/1053/180/180" alt="추가">
            <div class="info">
                <span class="pair-name">New Story 🌊</span>
                <span class="d-day">Loading...</span>
            </div>
        </a>

        <a href="link5.html" class="polaroid p6" data-start="2026-05-18">
            <div class="tape"></div>
            <img src="https://picsum.photos/id/152/180/180" alt="추가">
            <div class="info">
                <span class="pair-name">Memories 🌸</span>
                <span class="d-day">Loading...</span>
            </div>
        </a>

        <div class="sticker" style="top: 10%; left: 45%;">✨</div>
        <div class="sticker" style="bottom: 20%; right: 10%;">🍀</div>
        <div class="sticker" style="top: 50%; left: 5%;">🎨</div>
    </div>

    <script>
        function updateDDays() {
            const polaroids = document.querySelectorAll('.polaroid');
            const today = new Date();

            polaroids.forEach(p => {
                const startStr = p.getAttribute('data-start');
                if (startStr) {
                    const start = new Date(startStr);
                    const diff = today - start;
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
                    p.querySelector('.d-day').innerText = `D+${days}`;
                }
            });
        }

        window.onload = updateDDays;
    </script>
</body>
</html>
