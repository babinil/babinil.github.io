<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>By binil</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Nanum Myeongjo', serif;
            overflow: hidden;
            color: white;
            transition: background 1s ease-in-out; /* 배경 변경 시 부드럽게 */
        }

        /* [4번 노이즈 질감] */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
        }

        /* 사이드 화살표 버튼 */
        .side-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 50px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 150;
            padding: 20px;
        }

        .side-btn:hover {
            color: white;
            transform: translateY(-50%) scale(1.2);
        }

        .prev-side { left: 30px; }
        .next-side { right: 30px; }

        /* 중앙 원형 카드 */
        #main-link {
            text-decoration: none;
            color: white;
            z-index: 10;
        }

        .circle-content {
            width: 350px;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        .circle-content:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.12);
        }

        /* 눈송이 */
        .snow {
            position: fixed;
            top: -10px;
            color: white;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 1;
        }

        @keyframes fall { to { transform: translate(100px, 100vh); } }
        
        
        }
    </style>
</head>
<body id="bg-body">

    <!-- 사이드 화살표 -->
    <button class="side-btn prev-side" onclick="changePage(-1)">❮</button>
    <button class="side-btn next-side" onclick="changePage(1)">❯</button>

    <!-- 중앙 카드 -->
    <a href="link1.html" id="main-link">
        <div class="circle-content">
            <h1 id="title"> </h1>
            <p id="startDate">Loading...</p>
            <span style="font-size: 11px; margin-top: 20px; opacity: 0.4;">CLICK TO ENTER</span>
        </div>
    </a>

    <script>
        
        // 페이지 데이터 설정 (이미지 주소, 제목, 문구, 링크)
        const pages = [
            {
                bg: "radial-gradient(circle at center, #1a2a6c 0%, #000000 100%)",
                title: "J x 리에",
                startDate: "2025-02-17",
                link: "link1.html"
            },
            {
                bg: "radial-gradient(circle at center, #4b1212 0%, #000000 100%)",
                title: "론 x 벨라",
                startDate: "2025-07-16",
                link: "link2.html"
            },
            {
                bg: "radial-gradient(circle at center, #2c3e50 0%, #000000 100%)",
                title: "C x 루나",
                startDate: "2025-08-24",
                link: "link3.html"
            }
        ];

        let currentPage = 0;

        // 날짜 계산 전달
        function calculateDays(dateString) {
            if (!dateString) return ""; // 날짜 정보가 없으면 빈 칸 반환
            const start = new Date(dateString);
            const today = new Date();
            const diff = today - start;
            const dayCount = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;

            return `❤️ ${dayCount}`;
        }

        function changePage(direction) {
            currentPage += direction;
            if (currentPage >= pages.length) currentPage = 0;
            if (currentPage < 0) currentPage = pages.length - 1;

            const data = pages[currentPage];
            
            // 데이터 교체
            document.getElementById('bg-body').style.background = data.bg;
            document.getElementById('title').innerText = data.title;
            document.getElementById('startDate').innerText = calculateDays(data.startDate);
            document.getElementById('main-link').href = data.link;

            // 날짜 정보(startDate)가 있으면 계산해서 넣고, 없으면 일반 문구(desc)를 넣음
            if (data.startDate) {
                document.getElementById('desc').innerText = calculateDays(data.startDate);
                } else {
                document.getElementById('desc').innerText = data.desc;
            }
            
        }

        // 눈 생성 로직 (동일)
        function createSnow() {
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 10 + 10) + "px";
            snow.style.animationDuration = (Math.random() * 3 + 4) + "s";
            snow.style.opacity = Math.random() * 0.7;
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 7000);
        }
        setInterval(createSnow, 150);
        
        // 초기 배경 설정
        document.getElementById('bg-body').style.background = pages[0].bg;
        changePage(0);
    </script>
</body>
</html>
