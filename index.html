<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>By binil</title>
    <!-- 구글 폰트 (나눔명조) -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* [3번 조명 효과] 중앙은 밝고 가장자리는 어둡게 */
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            font-family: 'Nanum Myeongjo', serif;
            overflow: hidden;
            color: white;
        }

        /* [4번 노이즈 질감] 화면 전체에 미세한 입자감 부여 */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
        }

        /* 중앙 동그란 카드 */
        .main-circle {
            position: relative;
            width: 350px;
            height: 350px;
            text-decoration: none;
            color: white;
            z-index: 10;
        }

        .circle-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-radius: 50%; /* 👉 동그랗게 */
            
            /* 유리 질감 (Glassmorphism) */
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            /* 테두리 빛 반사 효과 */
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
            
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
        }

        /* 마우스를 올렸을 때 (Hover) */
        .main-circle:hover .circle-content {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 80px rgba(255, 255, 255, 0.1);
        }

        h1 { font-size: 28px; margin-bottom: 15px; opacity: 0.9; }
        p { font-size: 15px; line-height: 1.6; opacity: 0.7; padding: 0 40px; }

        /* 눈송이 스타일 */
        .snow {
            position: fixed;
            top: -10px;
            color: white;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 1; /* 카드보다 뒤에 배치 */
        }

        @keyframes fall {
            to { transform: translate(100px, 100vh); }
        }
    </style>
</head>
<body>

    <!-- 중앙 동그란 카드 (클릭 시 link1.html로 이동) -->
    <a href="link1.html" class="main-circle">
        <div class="circle-content">
            <h1>J 💔 리에</h1>
            <p>"너는 나의 부서진 세계에 남은 유일한 약속이었다."</p>
            <span style="font-size: 12px; margin-top: 20px; opacity: 0.4;">CLICK TO ENTER</span>
        </div>
    </a>

    <script>
        function createSnow() {
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 10 + 10) + "px";
            snow.style.animationDuration = (Math.random() * 3 + 4) + "s"; // 눈 속도 약간 느리게
            snow.style.opacity = Math.random() * 0.7;

            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 7000);
        }
        setInterval(createSnow, 150);
    </script>
</body>
</html>
