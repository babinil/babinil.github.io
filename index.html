<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>J 💔 리에</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Nanum Myeongjo', serif;
            overflow: hidden;
            color: white;
            transition: background 1s ease-in-out; /* 배경 변경 시 부드럽게 */
        }

        /* [4번 노이즈 질감] */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
        }

        /* 사이드 화살표 버튼 */
        .side-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 50px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 150;
            padding: 20px;
        }

        .side-btn:hover {
            color: white;
            transform: translateY(-50%) scale(1.2);
        }

        .prev-side { left: 30px; }
        .next-side { right: 30px; }

        /* 중앙 원형 카드 */
        #main-link {
            text-decoration: none;
            color: white;
            z-index: 10;
        }

        .circle-content {
            width: 350px;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        .circle-content:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.12);
        }

        /* 눈송이 */
        .snow {
            position: fixed;
            top: -10px;
            color: white;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 1;
        }

        @keyframes fall { to { transform: translate(100px, 100vh); } }
        
           /* 화면 폭이 768px 이하일 때 (보통 태블릿 ~ 모바일) */
        @media (max-width: 768px) {
            .circle-content {
                /* 모바일 화면 너비의 80% 정도를 차지하게 설정 */
                width: 80vw; 
                height: 80vw; /* 가로 세로를 똑같이 vw로 주면 항상 정원형이 됩니다 */
                max-width: 300px; /* 너무 커지지 않게 한계치 설정 */
                max-height: 300px;
            }
        
            h1 {
                font-size: 22px; /* 글자 크기도 모바일에 맞게 살짝 줄임 */
            }
        
            p {
                font-size: 13px;
                padding: 0 30px;
            }
            
            .side-btn {
                font-size: 40px; /* 화살표 크기 조정 */
                padding: 10px;
            }
        }
    </style>
</head>
<body id="bg-body">

    <!-- 사이드 화살표 -->
    <button class="side-btn prev-side" onclick="changePage(-1)">❮</button>
    <button class="side-btn next-side" onclick="changePage(1)">❯</button>

    <!-- 중앙 카드 -->
    <a href="link1.html" id="main-link">
        <div class="circle-content">
            <h1 id="title">J 💔 리에</h1>
            <p id="desc">"너는 나의 부서진 세계에 남은 유일한 약속이었다."</p>
            <span style="font-size: 11px; margin-top: 20px; opacity: 0.4;">CLICK TO ENTER</span>
        </div>
    </a>

    <script>
        // 페이지 데이터 설정 (이미지 주소, 제목, 문구, 링크)
        const pages = [
            {
                bg: "radial-gradient(circle at center, #2c3e50 0%, #000000 100%)",
                title: "J 💔 리에",
                desc: '"너는 나의 부서진 세계에 남은 유일한 약속이었다."',
                link: "link1.html"
            },
            {
                bg: "radial-gradient(circle at center, #1a2a6c 0%, #000000 100%)",
                title: "짙은 밤의 기억",
                desc: '"기억은 눈처럼 쌓여서 발자국을 지운다."',
                link: "link2.html"
            },
            {
                bg: "radial-gradient(circle at center, #4b1212 0%, #000000 100%)",
                title: "마지막 약속",
                desc: '"다시 만날 날까지, 부디 깨지지 않기를."',
                link: "link3.html"
            }
        ];

        let currentPage = 0;

        function changePage(direction) {
            currentPage += direction;
            if (currentPage >= pages.length) currentPage = 0;
            if (currentPage < 0) currentPage = pages.length - 1;

            const data = pages[currentPage];
            
            // 데이터 교체
            document.getElementById('bg-body').style.background = data.bg;
            document.getElementById('title').innerText = data.title;
            document.getElementById('desc').innerText = data.desc;
            document.getElementById('main-link').href = data.link;
        }

        // 눈 생성 로직 (동일)
        function createSnow() {
            const snow = document.createElement("div");
            snow.className = "snow";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.fontSize = (Math.random() * 10 + 10) + "px";
            snow.style.animationDuration = (Math.random() * 3 + 4) + "s";
            snow.style.opacity = Math.random() * 0.7;
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 7000);
        }
        setInterval(createSnow, 150);
        
        // 초기 배경 설정
        document.getElementById('bg-body').style.background = pages[0].bg;
    </script>
</body>
</html>
